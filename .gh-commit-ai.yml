# gh-commit-ai configuration
# This file configures the two-model pipeline for optimal commit message generation

# AI Provider
ai_provider: auto

# Two-Model Pipeline Configuration
# Stage 1: Code analysis (devstral - code-specialized model)
# Stage 2: Commit writing (gemma3:12b - fast writing model)
pipeline_enabled: true
analysis_model: devstral
ollama_model: gemma3:12b

# Code Review (optional separate command)
code_review_model: qwen2.5-coder:14b

# Commit Format
use_scope: false
use_gitmoji: false

# Performance
# 'auto' adapts the diff size to the commit (full diff for small commits, sampled
# for large ones) instead of a flat 200-line cap that starved big commits.
diff_max_lines: auto

# Ollama context window. Must be large enough to hold the instruction prompt plus
# the diff, or Ollama silently truncates and commit quality drops on big commits.
ollama_num_ctx: 16384

# Low temperature keeps commit messages faithful to the diff and consistent.
temperature: 0.3

# Features
learn_from_history: true
auto_fix: true
stream_enabled: auto
